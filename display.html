<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>قدها | شاشة المتسابقين</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="display-body">
  <div class="display-shell">
    <header class="display-header glass cinematic">
      <div>
        <div class="badge">🎯 شاشة المتسابقين</div>
        <h1 id="displayGameTitle">قدها</h1>
      </div>
      <div class="display-timer-box">
        <div class="tiny-label">الوقت</div>
        <div id="displayTimer" class="display-timer">00:30</div>
      </div>
    </header>

    <section id="welcomeScreen" class="stage-screen active glass cinematic center-screen">
      <div class="massive-title">قدها</div>
      <div id="displayWelcomeMessage" class="welcome-line">جاهزين؟ قدها ولا لا؟</div>
    </section>

    <section id="questionScreen" class="stage-screen glass cinematic">
      <div class="question-topline">
        <span id="displayCategory" class="mega-tag">الفئة</span>
        <span id="displayDifficulty" class="mega-tag easy">سهل</span>
        <span class="mega-tag">السؤال <span id="displayQuestionNumber">1</span></span>
      </div>
      <div id="displayQuestionText" class="display-question-text">بانتظار اختيار السؤال من لوحة التحكم</div>
      <div id="displayAnswerWrap" class="display-answer-wrap hidden">
        <div class="tiny-label">الإجابة</div>
        <div id="displayAnswerText" class="display-answer-text"></div>
      </div>
    </section>

    <section id="scoresScreen" class="stage-screen glass cinematic">
      <div class="screen-title">لوحة النقاط</div>
      <div id="displayScoreboard" class="display-scoreboard"></div>
    </section>

    <section id="winnerScreen" class="stage-screen glass cinematic center-screen">
      <div class="tiny-label">الفائز</div>
      <div id="winnerTeamName" class="winner-team-name">بانتظار حسم الجولة</div>
      <div id="winnerMessage" class="winner-message">الف مبروك يا أبطال</div>
    </section>
  </div>
  <script src="app.js"></script>
</body>
</html>
